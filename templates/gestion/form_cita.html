{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">{% if cliente %}Agendar cita para {{ cliente.nombre }}{% else %}Nueva Cita{% endif %}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cliente</label>
                            {{ form.cliente }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Óptico asignado</label>
                            {{ form.optico }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Fecha y Hora</label>
                            {{ form.fecha_hora }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo de la cita</label>
                            {{ form.motivo_cita }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Estado inicial</label>
                            {{ form.estado }}
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'agenda' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-info text-white">Guardar Cita</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
